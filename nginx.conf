# SPA + security headers for production static hosting.
# Used by nginxinc/nginx-unprivileged (listens on 8080 by default).

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # gzip (small static assets)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets (Vite emits fingerprinted files under /assets/)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers (tune CSP for your domains: Firebase, Mapbox, Supabase, Google APIs)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Starter CSP — tighten after testing (Mapbox/Firebase need specific connect-src)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.mapbox.com; worker-src 'self' blob:; connect-src 'self' https: wss: data: blob:; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://*.mapbox.com; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
}
